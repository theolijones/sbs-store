name: Electron Release

on:
  workflow_dispatch:
    inputs:
      app-id:
        description: 'App ID (e.g. ingest-tool)'
        required: true
        type: string
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/${{ inputs.app-id }}
          npm ci

      - name: Build
        run: |
          cd apps/${{ inputs.app-id }}
          npm run build

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.app-id }}-v${{ inputs.version }}
          name: "${{ inputs.app-id }} v${{ inputs.version }}"
          files: |
            apps/${{ inputs.app-id }}/dist/*.dmg
            apps/${{ inputs.app-id }}/dist/*.exe
            apps/${{ inputs.app-id }}/dist/*.AppImage
          generate_release_notes: true

      - name: Update registry
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          node -e "
            const fs = require('fs');
            const reg = JSON.parse(fs.readFileSync('store/registry.json', 'utf-8'));
            const app = reg.apps.find(a => a.id === '${{ inputs.app-id }}');
            if (app) {
              app.version = '${{ inputs.version }}';
              app.updated = '$TODAY';
              app.changelog.unshift({
                version: '${{ inputs.version }}',
                date: '$TODAY',
                notes: 'Release ${{ inputs.version }}'
              });
              reg.lastUpdated = '$TODAY';
            }
            fs.writeFileSync('store/registry.json', JSON.stringify(reg, null, 2) + '\n');
          "

      - name: Commit registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/registry.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update registry for ${{ inputs.app-id }} v${{ inputs.version }}"
          git push
