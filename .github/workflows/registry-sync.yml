name: Registry Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync federated registries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const reg = JSON.parse(fs.readFileSync('store/registry.json', 'utf-8'));
            const sources = reg.sources || {};
            const knownIds = new Set(reg.apps.map(a => a.id));
            let changed = false;

            async function main() {
              for (const [sourceId, source] of Object.entries(sources)) {
                if (!source.registryPath) continue;

                const url = 'https://raw.githubusercontent.com/' +
                  source.org + '/' + source.repo + '/' + source.branch + '/' + source.registryPath;

                try {
                  const res = await fetch(url, {
                    headers: process.env.GH_TOKEN
                      ? { 'Authorization': 'token ' + process.env.GH_TOKEN }
                      : {}
                  });
                  if (!res.ok) { console.log('Skip ' + sourceId + ': HTTP ' + res.status); continue; }
                  const remote = await res.json();

                  for (const app of (remote.apps || [])) {
                    const existing = reg.apps.find(a => a.id === app.id);
                    if (existing) {
                      // Primary wins on conflict — only update if remote is newer and source matches
                      if (existing.sourceId === sourceId && existing.version !== app.version) {
                        // Keep primary version (primary wins)
                        console.log('Conflict for ' + app.id + ': keeping primary v' + existing.version);
                      }
                    } else {
                      console.log('Adding new app: ' + app.id + ' from ' + sourceId);
                      reg.apps.push({ ...app, sourceId: app.sourceId || sourceId });
                      changed = true;
                    }
                  }
                } catch (err) {
                  console.log('Error fetching ' + sourceId + ': ' + err.message);
                }
              }

              if (changed) {
                reg.lastUpdated = new Date().toISOString().slice(0, 10);
                fs.writeFileSync('store/registry.json', JSON.stringify(reg, null, 2) + '\n');
                console.log('Registry updated.');
              } else {
                console.log('No changes from upstream sources.');
              }
            }

            main();
          "

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/registry.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync registry from upstream sources"
          git push
